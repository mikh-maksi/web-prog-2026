<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr =[];
        for(let i = 0;i<10;i+=1){
            arr.push(Math.floor(Math.random()*10));
        }
        console.log(arr);

        let min = arr[0];
        let i_min = 0;
        for(let i=1;i<arr.length;i+=1){
            if (arr[i]<min){
                min = arr[i];
                i_min = i;
            }
        }
        console.log("min = "+min+" i_min="+i_min);

    </script>
</body>
</html>
